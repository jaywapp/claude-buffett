<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일간 기업리포트</title>
  <meta property="og:title" content="일간 기업리포트">
  <meta property="og:description" content="Claude Buffett 일간 기업 분석 리포트">
  <meta name="theme-color" content="#ff385c">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.4/lib/marked.umd.js"></script>
  <style>
    :root {
  --canvas: #ffffff;
  --ink: #222222;
  --body-color: #3f3f3f;
  --muted: #6a6a6a;
  --rausch: #ff385c;
  --rausch-hover: #e00b41;
  --surface-soft: #f7f7f7;
  --hairline: #dddddd;
  --shadow: rgba(0,0,0,0.02) 0 0 0 1px, rgba(0,0,0,0.04) 0 2px 6px 0;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-full: 9999px;
  --content-max: 768px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, -apple-system, system-ui, sans-serif;
  background: var(--canvas);
  color: var(--ink);
  min-height: 100vh;
}

a { color: var(--rausch); text-decoration: none; }
a:hover { color: var(--rausch-hover); text-decoration: underline; }

.container {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 0 24px;
}

/* Header */
.site-header {
  height: 48px;
  border-bottom: 1px solid var(--hairline);
  background: var(--canvas);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
}
.site-logo { font-size: 16px; font-weight: 700; color: var(--ink); line-height: 1.15; }

/* Copy link button */
.detail-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.copy-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--hairline);
  border-radius: var(--radius-sm); padding: 6px 12px;
  cursor: pointer; font-family: inherit; font-size: 13px; color: var(--muted);
  transition: border-color 0.15s, color 0.15s;
}
.copy-btn:hover { border-color: var(--ink); color: var(--ink); }
.copy-btn.copied { border-color: var(--rausch); color: var(--rausch); }

/* Main */
#main { padding-top: 32px; padding-bottom: 64px; }

/* Cards */
.report-list { display: flex; flex-direction: column; gap: 12px; }
.report-card {
  border: 1px solid var(--hairline);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: box-shadow 0.15s;
}
.report-card:hover { box-shadow: var(--shadow); }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.card-date { font-size: 14px; color: var(--muted); }
.card-badge {
  font-size: 12px; font-weight: 600;
  color: var(--rausch);
  border: 1px solid var(--rausch);
  border-radius: var(--radius-full);
  padding: 2px 8px;
}
.card-title { font-size: 16px; font-weight: 600; color: var(--ink); }

/* Skeleton */
.skeleton { border: 1px solid var(--hairline); border-radius: var(--radius-md); padding: 20px; }
.skeleton-line {
  background: var(--surface-soft);
  border-radius: 4px;
  margin-bottom: 8px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* States */
.error-msg, .empty-msg { text-align: center; padding: 48px 0; color: var(--muted); font-size: 15px; }
.retry-btn {
  margin-top: 12px;
  background: none;
  border: 1px solid var(--hairline);
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  color: var(--ink);
}
.retry-btn:hover { background: var(--surface-soft); }

/* Detail */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--rausch);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 24px;
  cursor: pointer;
}
.back-link:hover { color: var(--rausch-hover); }

.markdown-body { line-height: 1.7; color: var(--body-color); }
.markdown-body h1 { font-size: 24px; font-weight: 700; color: var(--ink); margin: 0 0 16px; }
.markdown-body h2 { font-size: 20px; font-weight: 600; color: var(--ink); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--hairline); }
.markdown-body h3 { font-size: 18px; font-weight: 600; color: var(--ink); margin: 24px 0 10px; }
.markdown-body p { margin-bottom: 16px; font-size: 16px; }
.markdown-body ul, .markdown-body ol { margin: 0 0 16px 24px; }
.markdown-body li { margin-bottom: 6px; font-size: 16px; }
.markdown-body strong { font-weight: 600; color: var(--ink); }
.markdown-body hr { border: none; border-top: 1px solid var(--hairline); margin: 32px 0; }
.markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
.markdown-body th { background: var(--surface-soft); font-weight: 600; padding: 10px 12px; border: 1px solid var(--hairline); text-align: left; }
.markdown-body td { padding: 10px 12px; border: 1px solid var(--hairline); }
.markdown-body code { background: #fff0f3; color: #c0003a; padding: 2px 6px; border-radius: 4px; font-size: 0.92em; font-family: inherit; font-weight: 600; }
.markdown-body pre { background: var(--surface-soft); padding: 16px; border-radius: var(--radius-sm); overflow-x: auto; margin-bottom: 16px; }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body blockquote { border-left: 3px solid var(--hairline); padding-left: 16px; color: var(--muted); margin: 0 0 16px; }

/* Responsive */
@media (max-width: 744px) {
  .container { padding: 0 16px; }
  #main { padding-top: 20px; }
  .report-card { padding: 16px; }
  .markdown-body p, .markdown-body li { font-size: 15px; }
  .markdown-body table { display: block; overflow-x: auto; }
}
/* Search */
.search-wrap {
  position: sticky; top: 48px; z-index: 9;
  background: var(--canvas);
  padding: 12px 0;
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 16px;
}
.search-box {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--hairline); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 15px; color: var(--ink);
  outline: none; background: var(--canvas);
}
.search-box:focus { border-color: var(--ink); }
.company-title { display: flex; justify-content: space-between; align-items: center; }
.chevron { color: var(--muted); font-size: 20px; font-weight: 300; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <span class="site-logo">Claude<br>Buffett</span>
  </div>
</header>
<main class="container" id="main">
  <div id="view"></div>
</main>
<script>
const REPO = 'jaywapp/claude-buffett';
const API  = 'https://api.github.com';
let _companies = [];

/* ── API ── */
function encPath(p) {
  return p.split('/').map(encodeURIComponent).join('/');
}

async function fetchJSON(url) {
  const isFile = url.endsWith('.md');
  if (isFile) {
    const hit = sessionStorage.getItem(url);
    if (hit) return JSON.parse(hit);
  }
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (isFile) sessionStorage.setItem(url, JSON.stringify(data));
  return data;
}

async function fetchDirItems(apiPath) {
  const items = await fetchJSON(`${API}/repos/${REPO}/contents/${encPath(apiPath)}`);
  return {
    dirs:  items.filter(f => f.type === 'dir'),
    files: items.filter(f => f.type === 'file' && !f.name.startsWith('_'))
                .sort((a, b) => b.name.localeCompare(a.name)),
  };
}

async function fetchFileContent(apiPath) {
  const data = await fetchJSON(`${API}/repos/${REPO}/contents/${encPath(apiPath)}`);
  const bytes = Uint8Array.from(atob(data.content.replace(/\s/g, '')), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

function parseFileName(name) {
  const base = name.replace(/\.md$/, '');
  const m    = base.match(/^(\d{4}-\d{2}-\d{2})-?(.*)/);
  const date = m ? m[1] : '';
  const raw  = m ? m[2] : base;
  return { date, title: raw.replace(/-/g, ' ') || date };
}

/* ── Router ── */
function parseHash() {
  const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean);
  return {
    company: parts[0] ? decodeURIComponent(parts[0]) : null,
    slug:    parts[1] ? decodeURIComponent(parts[1]) : null,
  };
}

function navigate(...segments) {
  location.hash = segments.map(encodeURIComponent).join('/');
}

async function route() {
  const { company, slug } = parseHash();
  if (slug)         await renderDetail(company, slug);
  else if (company) await renderCompanyList(company);
  else              await renderList();
}

/* ── Helpers ── */
function skeletonHTML() {
  return Array(3).fill(0).map(() => `
    <div class="skeleton">
      <div class="skeleton-line" style="width:28%;height:14px"></div>
      <div class="skeleton-line" style="width:65%;height:18px;margin-top:10px"></div>
    </div>`).join('');
}

function errorHTML(msg, retryCall) {
  return `<div class="error-msg"><p>${msg}</p>
    <button class="retry-btn" onclick="${retryCall}">다시 시도</button></div>`;
}

/* ── Level 1: 기업 목록 ── */
function renderCompanyCards(query) {
  const filtered = query
    ? _companies.filter(d => d.name.toLowerCase().includes(query.toLowerCase()))
    : _companies;
  const list = document.getElementById('companyList');
  if (!list) return;
  if (!filtered.length) {
    list.innerHTML = '<p class="empty-msg">검색 결과가 없습니다.</p>';
    return;
  }
  list.innerHTML = filtered.map(d => `
    <div class="report-card" onclick="navigate('${d.name}')">
      <div class="card-title company-title">
        <span>${d.name}</span><span class="chevron">›</span>
      </div>
    </div>`).join('');
}

async function renderList() {
  const view = document.getElementById('view');
  view.innerHTML = `
    <div class="search-wrap">
      <input class="search-box" id="searchBox" placeholder="기업명 검색…"
             oninput="renderCompanyCards(this.value)">
    </div>
    <div class="report-list" id="companyList">${skeletonHTML()}</div>`;
  try {
    const { dirs } = await fetchDirItems('report/request');
    _companies = dirs;
    renderCompanyCards('');
  } catch {
    const list = document.getElementById('companyList');
    if (list) list.innerHTML = errorHTML('보고서를 불러올 수 없습니다.', 'renderList()');
  }
}

/* ── Level 2: 기업 리포트 목록 ── */
async function renderCompanyList(company) {
  const view = document.getElementById('view');
  const back = `<span class="back-link" onclick="navigate()">← 기업 목록</span>`;
  view.innerHTML = `${back}<div class="report-list">${skeletonHTML()}</div>`;
  try {
    const { files } = await fetchDirItems(`report/request/${company}`);
    if (!files.length) {
      view.innerHTML = `${back}<p class="empty-msg">아직 보고서가 없습니다.</p>`;
      return;
    }
    view.innerHTML = `${back}<div class="report-list">${files.map(f => {
      const { date, title } = parseFileName(f.name);
      const slug = f.name.replace(/\.md$/, '');
      return `<div class="report-card" onclick="navigate('${company}','${slug}')">
        <div class="card-meta">
          <span class="card-date">${date}</span>
          <span class="card-badge">${company}</span>
        </div>
        <div class="card-title">${title}</div>
      </div>`;
    }).join('')}</div>`;
  } catch {
    view.innerHTML = `${back}${errorHTML('보고서를 불러올 수 없습니다.', `renderCompanyList('${company}')`)}`;
  }
}

/* ── Level 3: 상세 ── */
async function renderDetail(company, slug) {
  const view = document.getElementById('view');
  const back = `<span class="back-link" onclick="navigate('${company}')">← ${company}</span>`;
  view.innerHTML = `${back}<div class="report-list">${skeletonHTML()}</div>`;
  try {
    const md   = await fetchFileContent(`report/request/${company}/${slug}.md`);
    const html = marked.parse(md);
    view.innerHTML = `
      <div class="detail-actions">
        ${back}
        <button class="copy-btn" id="copyBtn" onclick="copyLink()">🔗 링크 복사</button>
      </div>
      <div class="markdown-body">${html}</div>`;
  } catch {
    view.innerHTML = `${back}${errorHTML('보고서를 불러올 수 없습니다.', 'route()')}`;
  }
}

/* ── Copy Link ── */
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    if (!btn) return;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '🔗 링크 복사'; btn.classList.remove('copied'); }, 2000);
  });
}

/* ── Init ── */
window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
